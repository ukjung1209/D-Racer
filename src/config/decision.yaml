# 대회 주행용 파라미터 (race.launch.py가 읽음).
# ── 주행마다 여기 숫자만 고친다. 파이썬 런치는 안 건드림. ──
# 실시간 튜닝은 그대로: ros2 param set /decision_node steer_kp 1.2
#
# 트랙/조명이 크게 바뀌면 이 파일을 복사해 decision_track_A.yaml 식으로 프리셋을
# 만들고  ros2 launch inference race.launch.py params_file:=.../decision_track_A.yaml
# 로 골라 실행하면 된다.

# =====================================================================
#  통합 결정 노드 (차선추종 PD + 신호등 + 갈림길 + 동적장애물)
# =====================================================================
decision_node:
  ros__parameters:
    # --- 차선추종 PD (주행마다 제일 자주 바뀌는 값) ---
    steer_kp: 0.7
    steer_kd: 0.3
    steer_ka: 0.0
    steering_sign: -1.0        # 반대로 꺾이면 1.0
    base_throttle: 0.26
    lane_timeout_sec: 0.5

    # --- 가변속도 (직선 빠르게 / 코너 미리 감속) ---
    speed_ka: 0.7               # |angle|(전방 곡률) 예측 감속. ↑=코너서 더 느리게
    speed_ko: 0.5               # |offset|(현재 이탈) 보정 감속
    min_throttle: 0.21          # 감속 하한 (이보다 안 느려짐)
    throttle_accel_rate: 0.5    # 가속 슬루(초당 상한). ↓=더 완만하게 가속(튐 방지)

    # --- 미션 on/off (튜닝 땐 한 미션만 켜고 나머지 끔) ---
    enable_light_mission: true
    enable_fork_mission: true
    enable_obstacle_mission: true

    # --- 신호등 (초록불 출발 / 빨간불 정지) ---
    light_conf_min: 0.35        # object_node conf_threshold(0.35)와 맞춤: 박스 보이면 출발
    green_votes_needed: 1       # 초록불 1프레임만 봐도 출발 (모델 신뢰도 낮아 즉시 반응)
    red_votes_needed_light: 1   # 빨간불 1프레임만 봐도 정지 (모델 신뢰도 낮아 즉시 반응)

    # --- 좌/우 갈림길 (표지판 방향 확정 → 그 방향 라인 hugging, 중점을 PD로 자연 추종) ---
    sign_conf_min: 0.5
    sign_area_min: 0.01         # 이 크기 이상이어야 방향 인정 (너무 일찍 틀면 ↑)
    sign_votes_needed: 2        # 같은 방향 연속 이 횟수(10Hz 기준 0.2초)여야 확정 (곡선 오인식 방지)
    hug_speed_factor: 0.8       # hugging 중 스로틀 배수(0.8=20% 감속). min_throttle 하한은 유지됨
    hug_duration_sec: 5.0       # hugging 시작 후 이 시간 지나면 종료 → 원래 속도·차선주행 복귀
    hug_pause_sec: 0.3          # hugging 시작 직후 이 시간 정지 후 출발(카운터는 이 뒤부터)
    hug_hold_sec: 4.0           # 표지판 놓치고 이 시간 뒤 평소 복귀(폴백; 주 해제는 빨강 구간 진입)
    sign_stop_sec: 0.0          # 표지판 앞 정지 시간(stop-and-go), 0=끔(갈림길 정지 미사용)
    stop_lane_conf_min: 0.5     # 두 차선 이 conf 이상일 때만 정지

    # --- 동적 장애물 (빨강 감속 → 아루코 정지 → 통과 후 재출발) ---
    obstacle_process_every_n: 3  # image_callback N프레임당 1장 감지(30fps→10Hz). ⚠️ 아래 표수는 3배의 실시간을 의미
    slow_factor: 0.9            # 빨강 구간 감속 = 원속도의 90%
    red_roi_top_frac: 0.5
    red_ratio_trigger: 0.15
    red_votes_needed_obstacle: 3
    red_clear_time_sec: 1.0
    # 아루코 (이 마커 = 6X6_50 / ID3. 320x160 저해상도 실측 튜닝값)
    aruco_dict: '6X6_50'
    aruco_target_id: 3          # 이 ID만 정지(-1=아무 ID나)
    aruco_upscale: 2            # 불안정하면 3
    aruco_clahe: false          # 조명 나쁘면 true
    aruco_votes_needed: 1       # 보이면 바로 정지
    clear_time_sec: 1.5
    aruco_min_perimeter_rate: 0.01
    aruco_poly_accuracy: 0.08
    aruco_adaptive_win_max: 45
    aruco_error_correction: 0.4

# =====================================================================
#  차선 검출 (BEV 사다리꼴/흰색 마스크는 트랙마다 바뀜)
# =====================================================================
lane_node:
  ros__parameters:
    lane_color: 'white'
    white_s_max: 50             # BEV 튜닝: 채도 상한 (기존 20에서 완화)
    white_v_min: 120            # 명도 하한 절대 바닥 (흰선 없는 프레임에서 매트 안 잡히게)
    white_v_percentile: 50.0    # BEV에선 라인 비중이 커서 적응 컷이 라인을 자름 → 절대값(v_min)만 쓰게 낮춤
    white_tophat_ksize: 0       # BEV 튜닝: top-hat 끔 (글레어 남으면 ↑, 차선 끊기면 유지)
    white_tophat_min: 18
    roi_top_px: 45
    num_bands: 10
    line_split_gap_px: 40
    lane_half_width_px: 135     # BEV 차선폭 반영 (한쪽 체인만 있을 때 반대편 추정, 반폭 초기값)
    cluster_min_pixels: 15      # 흰 픽셀 수 하한 (hugging 후보 필터 + 체인 윈도우 점유 하한)
    cluster_max_width_px: 100   # hugging 외 클러스터 폭 상한(십자 가로획 판별). 넘으면 버림
    # --- 슬라이딩 윈도우 체인 (평소 경로) ---
    window_margin_px: 40        # 윈도우 폭 ±. ↑=휜 라인 더 따라가나 잡음 유입, ↓=엄격
    chain_max_gap: 2            # 빈 창 이만큼 연속이면 체인 종료(끊긴 라인 위로 추정 방지)
    coast_max_frames: 8         # 상실 후 직전 방향 유지 최대 프레임(초과 시 정지). 급발진 위험 시 ↓
    base_match_tol_px: 45       # 베이스 1피크 매칭 허용치(px). 직전 베이스에서 이 안이면 매칭
    hist_width_tol: 0.25        # 베이스 두 피크 간격 허용오차(차선폭 대비). ↑=관대
    half_width_est_alpha: 0.2   # 실측 반폭 EMA 계수
    angle_max_delta: 0.3        # 발행 angle 프레임당 최대 변화량(피팅선 폭주 흡수)
    hug_bias_px: 70             # 갈림길 hugging 시 라인에서 안쪽으로 떨어지는 정도(BEV px).
                                # lane_half_width_px(135)면 차선 중앙=평소 추종과 동일. 작을수록
                                # 추종 라인에 붙는다(더 붙이려면 ↓, 라인 밟으면 ↑).
    # --- BEV 사다리꼴 (트랙 실측 튜닝값) ---
    bev_top_left: 0.1
    bev_top_right: 0.9
    bev_top_y: 0.32
    bev_bottom_left: 0.0
    bev_bottom_right: 1.0
    publish_debug: true

# =====================================================================
#  물체 검출 (YOLO: left/right 표지판 + green/red 신호등)
# =====================================================================
object_node:
  ros__parameters:
    conf_threshold: 0.35
    yolo_gamma: 0.4             # 노출 낮아 어두우면 ↓
    yolo_clahe: false
    process_every_n: 1          # 매 프레임 추론(디버그 영상 부드럽게). ⚠️ YOLO가 코어 더 먹어 lane/control 끊길 수 있음
    publish_debug: true
